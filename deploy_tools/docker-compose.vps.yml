services:
  cbmedic-mysql:
    image: mysql:8.0
    container_name: cbmedic-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - cbmedic_mysql_data:/var/lib/mysql
    expose:
      - "3306"
    networks:
      - cbmedic_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./server
    container_name: cbmedic-server-bfjy8x
    restart: always
    expose:
      - "4000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "4000"
      NODE_ENV: production
      ADMIN_MASTER_PASSWORD: ${ADMIN_MASTER_PASSWORD}
      RENIEC_API_URL: ${RENIEC_API_URL}
      RENIEC_API_TOKEN: ${RENIEC_API_TOKEN}
    depends_on:
      cbmedic-mysql:
        condition: service_healthy
    networks:
      - cbmedic_net

  frontend:
    build:
      context: ./web
      args:
        VITE_API_URL: ""
    container_name: cbmedic-web
    restart: always
    expose:
      - "80"
    networks:
      - cbmedic_net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # --- HTTP → redirige a HTTPS ---
      - "traefik.http.routers.cbmedic-http.rule=Host(`cb-medic.72.60.13.187.sslip.io`)"
      - "traefik.http.routers.cbmedic-http.entrypoints=web"
      - "traefik.http.routers.cbmedic-http.middlewares=cbmedic-https-redirect"
      - "traefik.http.middlewares.cbmedic-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.cbmedic-https-redirect.redirectscheme.permanent=true"
      # --- HTTPS con Let's Encrypt ---
      - "traefik.http.routers.cbmedic-https.rule=Host(`cb-medic.72.60.13.187.sslip.io`)"
      - "traefik.http.routers.cbmedic-https.entrypoints=websecure"
      - "traefik.http.routers.cbmedic-https.tls=true"
      - "traefik.http.routers.cbmedic-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.cbmedic.loadbalancer.server.port=80"
    depends_on:
      - backend

volumes:
  cbmedic_mysql_data:

networks:
  cbmedic_net:
    driver: bridge
  dokploy-network:
    external: true
