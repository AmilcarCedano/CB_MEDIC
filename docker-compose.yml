version: '3.8'

services:
  backend:
    build:
      context: ./server
    expose:
      - "4000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=4000
      - NODE_ENV=production
      - ADMIN_MASTER_PASSWORD=${ADMIN_MASTER_PASSWORD}
      - RENIEC_API_URL=${RENIEC_API_URL}
      - RENIEC_API_TOKEN=${RENIEC_API_TOKEN}
    restart: always

  frontend:
    build:
      context: ./web
      args:
        - VITE_API_URL=
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
