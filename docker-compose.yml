version: '3.8'

services:
  backend:
    build:
      context: ./server
    expose:
      - "4000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=4000
    restart: always

  frontend:
    build:
      context: ./web
      args:
        - VITE_API_URL=
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
