server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Increase max upload size for file imports
    client_max_body_size 50M;

    # SPA routing - all frontend routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # Reverse Proxy to Backend (port 4000 internal)
    # All backend routes proxied through nginx
    # ============================================

    # Auth (public)
    location /auth/ {
        proxy_pass http://cbmedic-server-bfjy8x:4000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (public)
    location /health/ {
        proxy_pass http://cbmedic-server-bfjy8x:4000/health/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # RENIEC lookup (public)
    location /reniec/ {
        proxy_pass http://cbmedic-server-bfjy8x:4000/reniec/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Uploads (static files from backend)
    location /uploads/ {
        proxy_pass http://cbmedic-server-bfjy8x:4000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Protected API routes
    location /caja/ {
        proxy_pass http://cbmedic-server-bfjy8x:4000/caja/;
        proxy_set_header Host $host;
