upstream backend_api {
    server cbmedic-backend:4000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;
    absolute_redirect off;

    location ~ ^/(auth|health|reniec|uploads|caja|farmacias|categories|products|master|users|envios|clientes|ofertas|sales|servicios|comprobantes-servicios|config|configuracion-pago|auditoria|promociones|dashboard) {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
